name: Buf Push

# Publishes the OpenEngine schema module to the Buf Schema Registry
# (buf.build/openengine/openengine).
#
# This workflow is intentionally gated so it cannot auto-publish:
#   * `workflow_dispatch` lets a maintainer trigger it by hand.
#   * `push: tags: ['v*']` lets a tagged release publish a labeled commit.
# It does NOT run on every push to `main`.
#
# Prerequisites before this can succeed:
#   1. OSRB approval of BSR distribution for OpenEngine.
#   2. `buf.build/openengine` org + `openengine` module exist (public).
#   3. `BUF_TOKEN` repo secret is configured.
# Until then, the workflow is dormant.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

# Serialize publishes: overlapping tag pushes (or a manual dispatch racing a
# tag push) must never run two `buf push` jobs against the single module at
# once. Never cancel an in-flight publish; queue the next run instead.
# GitHub keeps only one run pending, so a rare 3-way overlap could drop a
# queued publish; acceptable since schema publishes are infrequent.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    # Only the canonical repo publishes, and a manual run is allowed only from
    # `main`; a tag push carries its own ref. Prevents a writer from dispatching
    # a publish of unreviewed schema off an arbitrary branch. Protect release
    # tags with a tag ruleset out of band.
    if: >-
      github.repository == 'ai-dynamo/openengine' &&
      (github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main')
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Full history so `buf push` derives accurate git metadata and labels.
          fetch-depth: 0

      - name: Push schema to Buf Schema Registry
        uses: bufbuild/buf-action@8c6a16e16f12ba20b6470afa9c2ba9b5ba8c97c3 # v1.5.0
        with:
          version: "1.72.0"
          token: ${{ secrets.BUF_TOKEN }}
          push: true
          lint: true
          format: false
          breaking: false
          archive: false
          pr_comment: false
          push_disable_create: true
