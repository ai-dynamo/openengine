name: Buf

on:
  push:
    branches:
      - main
    paths:
      - "proto/**"
      - "buf.yaml"
      - ".github/workflows/buf.yml"
  pull_request:
    paths:
      - "proto/**"
      - "buf.yaml"
      - ".github/workflows/buf.yml"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Lint schema
        uses: bufbuild/buf-action@8c6a16e16f12ba20b6470afa9c2ba9b5ba8c97c3 # v1.5.0
        with:
          version: "1.72.0"
          lint: true
          format: false
          breaking: false
          push: false
          archive: false
          pr_comment: false
