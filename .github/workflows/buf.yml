name: Buf

on:
  push:
    branches:
      - main
    paths:
      - "proto/**"
      - "buf.yaml"
      - ".github/workflows/buf.yml"
  pull_request:
    paths:
      - "proto/**"
      - "buf.yaml"
      - ".github/workflows/buf.yml"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Lint schema
        uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1
        with:
          version: "1.71.0"
          lint: true
          format: false
          breaking: true
          breaking_against: "https://github.com/ai-dynamo/openengine/archive/6262b4ce712f52d1d7964fade4a87a95b90fda57.tar.gz#strip_components=1"
          push: false
          archive: false
          pr_comment: false
