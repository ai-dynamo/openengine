name: Buf

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "proto/**"
      - "buf.yaml"
      - ".github/workflows/buf.yml"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
    paths:
      - "proto/**"
      - "buf.yaml"
      - ".github/workflows/buf.yml"
  delete:

permissions:
  contents: read
  pull-requests: write

jobs:
  schema:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate and publish schema
        uses: bufbuild/buf-action@v1
        with:
          version: "1.71.0"
          token: ${{ secrets.BUF_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          push_create_visibility: public
