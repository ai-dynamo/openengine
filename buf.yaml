version: v2

modules:
  - path: proto
    name: buf.build/openengine/openengine

lint:
  use:
    - STANDARD
  except:
    # OpenEngine is the public protocol name; appending Service would obscure it.
    - SERVICE_SUFFIX
    # Discovery and event RPCs intentionally return their domain message type
    # directly instead of adding one-field response wrappers.
    - RPC_RESPONSE_STANDARD_NAME

breaking:
  use:
    - FILE
  except:
    # OpenEngine is a pre-adoption draft and may prune unimplemented RPCs.
    - RPC_NO_DELETE
