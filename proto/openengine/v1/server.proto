// Server identity, deployment capacity, engine role, and parallelism metadata.

syntax = "proto3";

package openengine.v1;

import "openengine/v1/kv.proto";

enum EngineRole {
  ENGINE_ROLE_UNSPECIFIED = 0;
  ENGINE_ROLE_AGGREGATED = 1;
  ENGINE_ROLE_PREFILL = 2;
  ENGINE_ROLE_DECODE = 3;
}

message GetServerInfoRequest {}

message ServerInfo {
  string engine_name = 1; // sglang, vllm, tensorrt_llm, etc.
  string engine_version = 2;
  EngineRole engine_role = 3;
  string instance_id = 4;
  repeated string supported_models = 5;
  ParallelismInfo parallelism = 6;
  KvConnectorInfo kv_connector = 7;
  uint32 schema_revision = 8; // Monotonic wire contract revision; zero is invalid.
  uint32 minimum_client_revision = 9; // Oldest compatible client revision.
  string schema_release = 10; // Immutable release or source tag for this schema.
  // Configured capacity for this deployed server, not for an abstract model.
  DeploymentCapacity capacity = 11;
}

message DeploymentCapacity {
  // Tokens represented by one block in the deployed KV-cache layout.
  optional uint32 kv_block_size = 1;
  // Allocatable KV blocks in the server's capacity-reporting scope.
  optional uint64 total_kv_blocks = 2;
  // Configured ceiling for concurrently running requests.
  optional uint64 max_running_requests = 3;
  // Configured scheduler ceiling for tokens in one batch.
  optional uint64 max_batched_tokens = 4;
  // Maximum number of LoRA adapters that may be resident simultaneously.
  optional uint32 max_loras = 5;
}

message ParallelismInfo {
  optional uint32 tensor_parallel_size = 1;
  optional uint32 pipeline_parallel_size = 2;
  optional uint32 data_parallel_size = 3;
  optional uint32 data_parallel_rank = 4;
  optional uint32 data_parallel_start_rank = 5;
  // Number of ranks in each decode-context-parallel group. Must be at least 1.
  optional uint32 decode_context_parallel_size = 6;
}
